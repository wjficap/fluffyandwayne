<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon-32x32.png" type="image/png">
<title>Funds</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: black;
  margin: 0;
  padding: 10px 15px 20px 15px; /* Slightly reduced padding for mobile comfort */
  display: flex;
  flex-direction: column;
  align-items: center;
  box-sizing: border-box;
}

/* Ensure all elements calculate widths correctly */
*, *:before, *:after {
  box-sizing: inherit;
}

.bookmarkContainer2 {
  white-space: pre-line;
  font-weight: bold;
  width: 100%;
  max-width: 1000px;
} 

/* --- Spreadsheet Container --- */
.sheet-container {
  width: 100%;
  max-width: 690px;
  background: white;
  border-radius: 0px;
  padding: 0px;
  box-shadow: 0 0px 0px rgba(0,0,0,0.12);
  margin: 0px 0;
  display: flex;
  justify-content: center;
}

.sheet-container iframe {
  width: 100%;
  height: 635px;
  border: none;
}

/* --- Market Times Section --- */
.market-times {
  display: flex;
  justify-content: center;
  gap: 15px; /* Reduced gap for better mobile spacing */
  margin-bottom: 30px;
  flex-wrap: wrap;
  width: 100%;
  max-width: 1000px;
}
.market {
  padding: 15px 20px;
  border-radius: 15px;
  width: 100%;
  max-width: 200px; /* Allows it to shrink nicely if needed */
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  transition: transform 0.2s, box-shadow 0.2s, background-color 0.5s ease;
}

/* Day time / Market is Open */
.market.open { background: #fef08a; }
.market.open h3 { color: #1e293b; }
.market.open .time { color: #0f172a; }
.market.open .countdown { color: #166534; }

/* Night time / Market is Closed or Holiday */
.market.closed, .market.holiday { background: #334155; }
.market.closed h3, .market.holiday h3 { color: #cbd5e1; }
.market.closed .time, .market.holiday .time { color: #f8fafc; }
.market.closed .countdown { color: #f97316; }
.market.holiday .countdown { color: #94a3b8; }

.market h3 {
  margin: 0 0 12px 0;
  font-size: 18px;
}
.market .time {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.market .countdown {
  font-size: 14px;
  font-weight: 600;
}

/* --- Bookmark Tiles --- */
.bookmark-grid {
  display: grid;
  /* Default grid layout for desktop */
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 1000px;
  margin-bottom: 40px;
}
.bookmark {
  background: white;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: #333;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.bookmark:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}
.bookmark img {
  max-width: 48px; /* Slightly scaled down for mobile optimization */
  margin-bottom: 8px;
}
.bookmark span {
  display: block;
  font-weight: bold;
  text-align: center;
  font-size: 14px;
  word-break: break-word; /* Prevents long text from pushing dimensions out */
}

/* --- Separator --- */
.separator {
  width: 100%;
  max-width: 1000px;
  text-align: center;
  margin: 30px 0 15px;
  position: relative;
}
.separator:first-child { margin-top: 10px; }
.separator::before, .separator::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 30%; /* Decreased so long text titles don't clash on small screens */
  height: 2px;
  background: #ccc;
}
.separator::before { left: 0; }
.separator::after { right: 0; }
.separator span {
  padding: 0 10px;
  font-size: 16px;
  font-weight: bold;
  color: #ffae00;
  background: rgb(0, 0, 0);
  position: relative;
  z-index: 1;
}

/* ==================== MOBILE OPTIMIZATIONS (iPhone) ==================== */
@media (max-width: 600px) {
  body {
    /* Safe centering fallback to prevent left-side clipping */
    align-items: normal; 
  }
  
  .bookmark-grid {
    /* Forces exactly 2 side-by-side columns on mobile layout */
    grid-template-columns: repeat(2, 1fr);
    gap: 12px; /* Tighter spacing so it fits neatly without scrolling */
  }

  .separator::before, .separator::after {
    display: none; /* Hides lines on mobile if text is extra long to avoid clutter */
  }
  
  .separator span {
    font-size: 14px;
  }
}

</style>
</head>

<body>

// ==================== MARKET TIMES ====================
function getTimeInTimeZone(timeZone) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone,
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  }).formatToParts(now);
  const values = {};
  parts.forEach(p => { values[p.type] = parseInt(p.value, 10); });
  return new Date(values.year, values.month - 1, values.day, values.hour, values.minute, values.second);
}

function formatTime(timeZone) {
  return new Intl.DateTimeFormat('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone }).format(new Date());
}

function getNextOpenDate(d, openHour, openMin) {
  const nextOpen = new Date(d.getFullYear(), d.getMonth(), d.getDate(), openHour, openMin, 0, 0);
  
  if (d.getDay() === 0 || d.getDay() === 6 || d >= nextOpen) {
    do { nextOpen.setDate(nextOpen.getDate() + 1); } while (nextOpen.getDay() === 0 || nextOpen.getDay() === 6);
  }
  return nextOpen;
}

function getCountdown(timeZone, openHour, openMin, closeHour, closeMin) {
  const d = getTimeInTimeZone(timeZone);
  const day = d.getDay();
  const openTime = new Date(d);
  openTime.setHours(openHour, openMin, 0, 0);
  const closeTime = new Date(d);
  closeTime.setHours(closeHour, closeMin, 0, 0);
  let statusText = '', className = '';
  
  if (day === 0 || day === 6) {
    const nextOpen = getNextOpenDate(d, openHour, openMin);
    const diff = nextOpen - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'holiday';
  } else if (d < openTime) {
    const diff = openTime - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'closed';
  } else if (d >= openTime && d <= closeTime) {
    const diff = closeTime - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Closes in ${h}h ${m}m`;
    className = 'open';
  } else {
    const nextOpen = getNextOpenDate(d, openHour, openMin);
    const diff = nextOpen - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'closed';
  }
  return { statusText, className };
}

function updateTimes() {
  const markets = [
    { idTime: 'ny-time', idCount: 'ny-countdown', tz: 'America/New_York', open:[9,30], close:[16,0] },
    { idTime: 'london-time', idCount: 'lse-countdown', tz: 'Europe/London', open:[8,0], close:[16,30] },
    { idTime: 'sg-time', idCount: 'sg-countdown', tz:'Asia/Singapore', open:[9,0], close:[17,0] }
  ];
  markets.forEach(m => {
    const timeEl = document.getElementById(m.idTime);
    const countdownEl = document.getElementById(m.idCount);
    const marketCard = countdownEl.parentElement;
    timeEl.textContent = formatTime(m.tz);
    const { statusText, className } = getCountdown(m.tz, m.open[0], m.open[1], m.close[0], m.close[1]);
    countdownEl.textContent = statusText;
    marketCard.classList.remove('open','closed','holiday');
    marketCard.classList.add(className);
  });
}

setInterval(updateTimes, 1000);
updateTimes();
