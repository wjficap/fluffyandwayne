<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon-32x32.png" type="image/png">
<title>Funds</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #4682B4;
  margin: 0;
  padding: 10px 20px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* --- Spreadsheet Container --- */
.sheet-container {
  width: 50%;
  max-width: 690px;
  background: white;
  border-radius: 0px;
  padding: 0px;
  box-shadow: 0 0px 0px rgba(0,0,0,0.12);
  margin: 0px 0;
  display: flex;
  justify-content: center;
}

.sheet-container iframe {
  width: 100%;
  height: 635px; /* Adjust this height to fit your spreadsheet rows */
  border: none;
}

/* --- Market Times Section --- */
.market-times {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.market {
  background: linear-gradient(145deg, #ffffff, #e3f2fd);
  padding: 20px 25px;
  border-radius: 15px;
  width: 200px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  transition: transform 0.2s, box-shadow 0.2s;
}
.market:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.2);
}
.market h3 {
  margin: 0 0 12px 0;
  font-size: 20px;
  color: #333;
}
.market .time {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #222;
}
.market .countdown {
  font-size: 15px;
  font-weight: 600;
  color: #555;
}
.market.open .countdown { color: #2e7d32; }
.market.closed .countdown { color: #ef6c00; }
.market.holiday .countdown { color: #9e9e9e; }

/* --- Bookmark Tiles --- */
.bookmark-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 1000px;
  margin-bottom: 40px;
}
.bookmark {
  background: white;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  text-decoration: none;
  color: #333;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.bookmark:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}
.bookmark img {
  max-width: 64px;
  margin-bottom: 8px;
}
.bookmark span {
  display: block;
  font-weight: bold;
  text-align: center;
}

/* --- Separator --- */
.separator {
  width: 100%;
  max-width: 1000px;
  text-align: center;
  margin: 40px 0 20px;
  position: relative;
}
.separator:first-child { margin-top: 10px; }
.separator::before, .separator::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 40%;
  height: 2px;
  background: #ccc;
}
.separator::before { left: 0; }
.separator::after { right: 0; }
.separator span {
  padding: 0 10px;
  font-size: 18px;
  font-weight: bold;
  color: #080808;
  background: #f4f4f9;
  position: relative;
  z-index: 1;
}
</style>
</head>

<body>

<!-- --- Market Times Section --- -->
<div class="market-times">
  <div class="market" id="nyse">
    <h3>New York</h3>
    <div class="time" id="ny-time">--:--:--</div>
    <div class="countdown" id="ny-countdown">Loading...</div>
  </div>
  <div class="market" id="lse">
    <h3>London</h3>
    <div class="time" id="london-time">--:--:--</div>
    <div class="countdown" id="lse-countdown">Loading...</div>
  </div>
  <div class="market" id="sgx">
    <h3>Singapore</h3>
    <div class="time" id="sg-time">--:--:--</div>
    <div class="countdown" id="sg-countdown">Loading...</div>
  </div>
</div>

<!-- --- Bookmark Container (Overview, Distributive, Accumulative) --- -->
<div id="bookmarkContainer"></div>

<!-- === REFRESH BUTTON (Outside) === -->
<div style="width: 100%; max-width: 1100px; text-align: center; margin: 15px 0 8px 0;">
  <button id="refreshBtn" 
          style="padding: 12px 28px; font-size: 17px; background: #1e88e5; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
    🔄 Refresh Google Sheet
  </button>
</div>

<!-- --- GOOGLE SHEET EMBED --- -->
<div class="sheet-container">
  <iframe id="sheetFrame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRhfusVGe5lzP6OjTvzmjnoR7uLOUEDd55TsvFkHIekIisi-itYR4wnmg7MHnWYOZmEhko9pfN-mRTG/pubhtml?gid=1226146132&amp;single=true&amp;widget=false&amp;headers=false&amp;chrome=false" 
    width="100%" 
    height="800" 
    frameborder="0" 
    scrolling="yes"
    style="border: none;">
  </iframe>
</div>

<!-- --- Bookmark Container 2 (Global News) --- -->
<div id="bookmarkContainer2"></div>

<script>
// ==================== BOOKMARKS 1 ====================
const bookmarkGroups = [
  { title: "Overview", bookmarks: [
      ["https://docs.google.com/spreadsheets/d/12Cp4o9yLMVKRsb57fNG-UYESj2huF5E2hg8iXI1W41A/edit?gid=0", "NAV"],
      ["https://docs.google.com/spreadsheets/d/1VylQGw-ucq-fkypk2a3IW_5GJ8whKcVE1yiUPUmUa7E/edit?gid=1242144670", "Opex & BigTix"]
  ]},
  { title: "Income Payout System", bookmarks: [
      ["https://docs.google.com/spreadsheets/d/1eKWk09uvkOsF4R0sVNyJTU-TiJP4th4Om_4eYKq-eGM/edit?gid=1256529310", "SREIT ($2.5k)"],
      ["https://docs.google.com/spreadsheets/d/1nzR-kc5mptVdLETS-GZMF40CDMSfy7sp0F1A5R98DVg/edit?gid=1265806445", "FαR🌋 (2% x AUM)"],
      ["https://docs.google.com/spreadsheets/d/1hpRVml3tFMYXrvKLq_vkW462K2sRuqDhOsFVm36gMT4/edit?gid=723408462", "CPF LIFE 2037 ($3.0k)"]
  ]},
  { title: "Closed Compound System", bookmarks: [

      ["https://docs.google.com/spreadsheets/d/1G985V27a1ZgdyhMgLRXrlAw6LuelfWeSVIYb-LWpZYw/edit?gid=1311830327", "SAIL ($3.8k ➜ ΘST)"],
      ["https://docs.google.com/spreadsheets/d/1JbtanV0T05Csp-dFvf2dpckkrRUTW_p0zAP3UgGe1f4/edit?gid=1256529310", "EIF ($1.2k ➜ ΘST)"],
      ["https://docs.google.com/spreadsheets/d/1oOUFGaLJBh1KAAYTuQPi5vTryEFR4woqZCqQTvFM8Lc/edit?gid=1813871616", "ΘST🌋 (12% x AUM)"]
  ]}

];

const container = document.getElementById("bookmarkContainer");
bookmarkGroups.forEach(group => {
  const sep = document.createElement("div");
  sep.className = "separator";
  sep.innerHTML = `<span>${group.title}</span>`;
  container.appendChild(sep);

  const grid = document.createElement("div");
  grid.className = "bookmark-grid";
  group.bookmarks.forEach(([url, name]) => {
    const a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.className = "bookmark";

    const img = document.createElement("img");
    img.src = new URL("/favicon.ico", url).href;
    img.alt = name;

    const span = document.createElement("span");
    span.textContent = name;

    a.appendChild(img);
    a.appendChild(span);
    grid.appendChild(a);
  });
  container.appendChild(grid);
});

// ==================== BOOKMARKS 2 ====================
const bookmarkGroups2 = [
  { title: "Global News", bookmarks: [
      ["https://wjficap.github.io/fluffyandwayne/cnbc.html", "CNBC"],
      ["https://wjficap.github.io/fluffyandwayne/wsj-world.html", "WSJ World"],
      ["https://wjficap.github.io/fluffyandwayne/wsj-markets.html", "WSJ Markets"],
      ["https://wjficap.github.io/fluffyandwayne/wsj-economy.html", "WSJ Economy"],
      ["https://wjficap.github.io/fluffyandwayne/bb-markets.html", "Bloomberg Markets"]
  ]},
  { title: "Local Business News", bookmarks: [
      ["https://www.businesstimes.com.sg/breaking-news", "BT-Breaking (Webpage + Ads)"],
      ["https://wjficap.github.io/fluffyandwayne/bt-biz.html", "BT-Business"],
      ["https://wjficap.github.io/fluffyandwayne/bt-ppty.html", "BT-Property"],
      ["https://wjficap.github.io/fluffyandwayne/st-biz.html", "ST-Business"],
      ["https://wjficap.github.io/fluffyandwayne/cna-biz.html", "CNA-Business"]
  ]},
  { title: "Local News", bookmarks: [
      ["https://wjficap.github.io/fluffyandwayne/st-sgp.html", "ST-Singapore"],
      ["https://wjficap.github.io/fluffyandwayne/cna-sgp.html", "CNA-Singapore"],
      ["https://wjficap.github.io/fluffyandwayne/bt-sgp.html", "BT-Singapore"],
      ["https://wjficap.github.io/fluffyandwayne/bt-wealth.html", "BT-Wealth"]
  ]}
];

const container2 = document.getElementById("bookmarkContainer2");
const genericFavicon = "/favicon-32x32.png";

bookmarkGroups2.forEach(group => {
  const sep2 = document.createElement("div");
  sep2.className = "separator";
  sep2.innerHTML = `<span>${group.title}</span>`;
  container2.appendChild(sep2);

  const openAllBtn = document.createElement("button");
  openAllBtn.textContent = "Open All";
  openAllBtn.style.cssText = "margin-bottom:10px; padding:8px 16px; background:#666; color:white; border:none; border-radius:6px; cursor:pointer;";
  openAllBtn.onclick = () => {
    group.bookmarks.forEach(([url]) => window.open(url, "_blank"));
  };
  container2.appendChild(openAllBtn);

  const grid2 = document.createElement("div");
  grid2.className = "bookmark-grid";

  group.bookmarks.forEach(([url, name]) => {
    const a2 = document.createElement("a");
    a2.href = url;
    a2.target = "_blank";
    a2.className = "bookmark";

    const img2 = document.createElement("img");
    img2.src = `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}`;
    img2.alt = name;
    img2.onerror = () => { img2.src = genericFavicon; };

    const span2 = document.createElement("span");
    span2.textContent = name;

    a2.appendChild(img2);
    a2.appendChild(span2);
    grid2.appendChild(a2);
  });
  container2.appendChild(grid2);
});

// ==================== MARKET TIMES ====================
function getTimeInTimeZone(timeZone) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone,
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  }).formatToParts(now);
  const values = {};
  parts.forEach(p => { values[p.type] = parseInt(p.value, 10); });
  return new Date(values.year, values.month - 1, values.day, values.hour, values.minute, values.second);
}

function formatTime(timeZone) {
  return new Intl.DateTimeFormat('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone }).format(new Date());
}

function getNextOpenDate(d, openHour, openMin) {
  const nextOpen = new Date(d);
  nextOpen.setHours(openHour, openMin, 0, 0);
  do { nextOpen.setDate(nextOpen.getDate() + 1); } while (nextOpen.getDay() === 0 || nextOpen.getDay() === 6);
  return nextOpen;
}

function getCountdown(timeZone, openHour, openMin, closeHour, closeMin) {
  const d = getTimeInTimeZone(timeZone);
  const day = d.getDay();
  const openTime = new Date(d);
  openTime.setHours(openHour, openMin, 0, 0);
  const closeTime = new Date(d);
  closeTime.setHours(closeHour, closeMin, 0, 0);
  let statusText = '', className = '';
  
  if (day === 0 || day === 6) {
    const nextOpen = getNextOpenDate(d, openHour, openMin);
    const diff = nextOpen - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'holiday';
  } else if (d < openTime) {
    const diff = openTime - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'closed';
  } else if (d >= openTime && d <= closeTime) {
    const diff = closeTime - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Closes in ${h}h ${m}m`;
    className = 'open';
  } else {
    const nextOpen = getNextOpenDate(d, openHour, openMin);
    const diff = nextOpen - d;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    statusText = `Opens in ${h}h ${m}m`;
    className = 'closed';
  }
  return { statusText, className };
}

function updateTimes() {
  const markets = [
    { idTime: 'ny-time', idCount: 'ny-countdown', tz: 'America/New_York', open:[9,30], close:[16,0] },
    { idTime: 'london-time', idCount: 'lse-countdown', tz: 'Europe/London', open:[8,0], close:[16,30] },
    { idTime: 'sg-time', idCount: 'sg-countdown', tz:'Asia/Singapore', open:[9,0], close:[17,0] }
  ];
  markets.forEach(m => {
    const timeEl = document.getElementById(m.idTime);
    const countdownEl = document.getElementById(m.idCount);
    const marketCard = countdownEl.parentElement;
    timeEl.textContent = formatTime(m.tz);
    const { statusText, className } = getCountdown(m.tz, m.open[0], m.open[1], m.close[0], m.close[1]);
    countdownEl.textContent = statusText;
    marketCard.classList.remove('open','closed','holiday');
    marketCard.classList.add(className);
  });
}

setInterval(updateTimes, 1000);
updateTimes();

// ==================== SHEET REFRESH ====================
function refreshSheet() {
  const iframe = document.getElementById('sheetFrame');
  const btn = document.getElementById('refreshBtn');
  
  btn.textContent = "🔄 Refreshing...";
  btn.disabled = true;

  iframe.src = iframe.src;

  setTimeout(() => {
    btn.textContent = "🔄 Refresh Sheet";
    btn.disabled = false;
  }, 1500);
}

// Button click
document.getElementById('refreshBtn').addEventListener('click', refreshSheet);

// Auto refresh ONCE when page loads
window.addEventListener('load', () => {
  setTimeout(refreshSheet, 1500);
});
</script>

</body>
</html>
